name: bloc_hive_caching_data
description: "A Flutter project to fetch data and save cache storing info in hive db."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Theme
  flex_color_scheme: ^8.4.0
  # Google Fonts
  google_fonts: ^6.0.0

  # Icons
  remixicon: ^1.4.1
  iconly: ^1.0.1

  # Log
  logger: ^2.6.2

  # Date, Time
  intl: ^0.20.2

  # Show images from the internet and keep them in the cache directory
  cached_network_image: ^3.2.3

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hive_generator: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13

flutter:
  uses-material-design: true
